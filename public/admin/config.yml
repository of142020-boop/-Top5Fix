backend:
  name: github
  repo: of142020-boop/-Top5Fix
  branch: main
  app_id: Ov23liy3aj1KeN7vHte6

locale: ar

media_folder: public/images
public_folder: /images

collections:
  - name: "services"
    label: "الخدمات والصنايعية"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    fields:
      - label: "قائمة الفنيين والصنايعية"
        name: "craftsmen"
        widget: "list"
        summary: '{{fields.name}} - {{fields.phone}}'
        collapsed: false
        fields:
          - { label: "حساب مفعل (يظهر للزوار)", name: "isActive", widget: "boolean", default: true, required: false }
          - { label: "تاريخ انتهاء الاشتراك", name: "subscriptionEndDate", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD", required: false }
          - { label: "الاسم", name: "name", widget: "string" }
          - { label: "رقم الهاتف", name: "phone", widget: "string" }
          - { label: "التقييم", name: "rating", widget: "number", value_type: "float", min: 1, max: 5 }
          - { label: "عدد المراجعات", name: "reviewCount", widget: "number", value_type: "int" }
          - { label: "المحافظة", name: "governorate", widget: "select", options: ["القاهرة", "الجيزة"] }
          - label: "مناطق الفني"
            name: "districts"
            widget: "list"
            field: { label: "المنطقة", name: "district", widget: "string" }
          - { label: "مسار الصورة الرمزية", name: "avatar", widget: "string", default: "/images/craftsman.png" }
          - { label: "موثق (علامة الصح)", name: "verified", widget: "boolean", default: true }
          - { label: "وقت الاستجابة", name: "responseTime", widget: "string" }
          - { label: "السعر يبدأ من", name: "priceFrom", widget: "number", value_type: "int" }
          - { label: "الخدمات المكتملة", name: "completedJobs", widget: "number", value_type: "int" }
          - { label: "رأي أحد العملاء", name: "clientReview", widget: "text" }
      - { label: "رابط الصفحة", name: "slug", widget: "string" }
      - { label: "اسم المهنة (مفرد)", name: "profession", widget: "string" }
      - { label: "اسم المهنة (جمع)", name: "professionPlural", widget: "string" }
      - { label: "الأيقونة التعبيرية", name: "icon", widget: "string" }
      - { label: "لون التصميم", name: "color", widget: "select", options: ["blue", "emerald", "amber", "rose", "slate", "purple", "cyan", "teal", "orange", "yellow", "indigo"] }
      - { label: "عنوان محرك البحث", name: "metaTitle", widget: "string" }
      - { label: "وصف محرك البحث", name: "metaDescription", widget: "text" }
      - { label: "المقدمة", name: "intro", widget: "text" }
      - label: "النصائح"
        name: "tips"
        widget: "list"
        summary: '{{fields.title}}'
        fields:
          - { label: "العنوان", name: "title", widget: "string" }
          - { label: "الوصف", name: "desc", widget: "text" }
      - label: "الأسئلة الشائعة"
        name: "faqs"
        widget: "list"
        summary: '{{fields.q}}'
        fields:
          - { label: "السؤال", name: "q", widget: "string" }
          - { label: "الإجابة", name: "a", widget: "text" }
      - label: "المناطق المتاحة للمهنة"
        name: "districts"
        widget: "list"
        field: { label: "المنطقة", name: "district", widget: "string" }
